<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Integral Substitusi - Gracewinna</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/MathJax.js"></script>
</head>
<body>

    <header>
        <h1>Kalkulator Integral Substitusi</h1>
        <p>Created by: <strong>Gracewinna</strong></p>
    </header>

    <main class="container">
        <section class="input-section">
            <h3>Bentuk Umum: $\int (ax + b)^n dx$</h3>
            <p>Masukkan nilai untuk fungsi integral substitusi linier:</p>
            
            <div class="form-group">
                <label for="input-a">Nilai a (koefisien x):</label>
                <input type="number" id="input-a" value="2" placeholder="Contoh: 2">
            </div>

            <div class="form-group">
                <label for="input-b">Nilai b (konstanta):</label>
                <input type="number" id="input-b" value="3" placeholder="Contoh: 3">
            </div>

            <div class="form-group">
                <label for="input-n">Pangkat n (bukan -1):</label>
                <input type="number" id="input-n" value="5" placeholder="Contoh: 5">
            </div>

            <button onclick="hitungIntegral()">Hitung Langkah</button>
        </section>

        <section class="result-section" id="result-box" style="display: none;">
            <h3>Langkah Penyelesaian:</h3>
            <div id="langkah-langkah"></div>
            
            <button id="btn-copy" onclick="salinTeks()" style="display: none; background-color: #28a745; margin-top: 15px;">
                Salin Langkah Penyelesaian
            </button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Gracewinna. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
